name: Makefile CI

on:
  push:
    branches:
      - main
      - develop
      - feature/**

jobs:
  build:
    name: Build and Refactor
    runs-on: ubuntu-latest

    steps:
    - name: 📦 Checkout repository
      uses: actions/checkout@v4

    - name: ⚙️ Install uv
      uses: astral-sh/setup-uv@v6
      with:
        version: "latest"

    - name: 🧰 Run `make setup`
      run: make setup

    - name: 🧹 Run `make refactor`
      run: make refactor

    - name: 📁 List files in workspace
      run: ls -la "${{ github.workspace }}"
