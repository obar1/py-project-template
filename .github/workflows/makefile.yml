name: Makefile CI

on: [push]


jobs:
  build:
    name: Build and Refactor
    runs-on: ubuntu-latest

    steps:
    - name: 📦 Checkout repository
      uses: actions/checkout@v4

    - name: 🧰 Run `make setup`
      run: make setup

    - name: 🧪 Run pre-commit checks
      run: |
        uv run pre-commit run --all-files
